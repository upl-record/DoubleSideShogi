# Yangmyeon Janggi for current Fairy-Stockfish master/dev builds.
#
# This config uses the newer custom-variant keys that are not available in
# the Fairy-Stockfish 14 release binary, especially dropPromoted and
# promotionRegionWhite/Black.  Keep variants-v14.ini for the old binary.

[yangmyeonjanggi]
variantTemplate = shogi
maxRank = 5
maxFile = 5
pocketSize = 8

# The original game has no check/checkmate rule.  A king is capturable;
# king loss is handled by extinction below.
king = -
commoner = k
checking = false

# Front faces.
shogiPawn = p
customPiece1 = t:WfF
gold = g
silver = s

# Back faces.
rook = r
lance = l
customPiece2 = n:fNfsN
bishop = b

# P1/White first rank, from left to right: Tokin, Silver, King, Gold, Pawn.
# P2/Black is point-symmetric from P1's view.
startFen = pgkst/5/5/5/TSKGP[-] w 0 1

# Captures go to hand as front-face pieces; drops are only on the player's
# own first rank and must not be promoted/back-face drops.
pieceDrops = true
capturesToHand = true
dropLoop = false
dropPromoted = false
dropRegionWhite = *1
dropRegionBlack = *5
firstRankPawnDrops = true
promotionZonePawnDrops = true
dropNoDoubled = -

# Every non-king move flips the piece.  Since every square is a promotion
# zone, front faces promote on every move and back faces demote on every move.
promotionPieceTypes = -
promotedPieceType = p:r t:l g:n s:b
promotionRegionWhite = *1 *2 *3 *4 *5
promotionRegionBlack = *1 *2 *3 *4 *5
mandatoryPawnPromotion = true
mandatoryPiecePromotion = true
pieceDemotion = true

castling = false
doubleStep = false
passOnStalemate = true

# King entering the opponent's first rank wins immediately.
flagPiece = k
flagRegionWhite = *5
flagRegionBlack = *1
flagMove = false
flagPieceSafe = false

# Direct king capture: if a side has no king/commoner, it loses.
extinctionValue = loss
extinctionPieceTypes = k
extinctionPseudoRoyal = false
extinctionNonRoyalBoard = true

# extinctionNonRoyalBoard is a small source-level extension added in the
# patched latest source tree.  It ends the game when a side has no non-king
# pieces on the board, ignoring hand pieces.
