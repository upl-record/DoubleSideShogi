name: Build GitHub Pages WASM

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container: emscripten/emsdk:1.39.16
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inspect WASM build inputs
        working-directory: Fairy-Stockfish-master-src/Fairy-Stockfish-master/src
        run: |
          set -eux
          pwd
          emcc -v
          make --version
          test -f Makefile_js
          test -f ffishjs.cpp
          test -f thread.cpp
          test -f nnue/evaluate_nnue.cpp
          test -f nnue/features/half_ka_v2.cpp
          test -f nnue/features/half_ka_v2_variants.cpp
          test -f syzygy/tbprobe.cpp
          test -d ../tests/js

      - name: Build Fairy-Stockfish WASM
        working-directory: Fairy-Stockfish-master-src/Fairy-Stockfish-master/src
        run: |
          set -eux
          make -f Makefile_js clean
          make -f Makefile_js build es6=yes > ../../../wasm-build.log 2>&1 || {
            status=$?
            cat ../../../wasm-build.log
            exit $status
          }
          cat ../../../wasm-build.log
          test -f ../tests/js/ffish.js
          test -f ../tests/js/ffish.wasm

      - name: Upload WASM build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: wasm-build-log
          path: wasm-build.log

      - name: Prepare Pages artifact
        run: |
          mkdir -p docs/Reference
          mkdir -p docs/engine
          cp index.html docs/index.html
          cp styles.css docs/styles.css
          cp brps_app.js docs/brps_app.js
          cp Reference/freesound_community-ficha-de-ajedrez-34722.mp3 docs/Reference/freesound_community-ficha-de-ajedrez-34722.mp3
          cp engine/yangmyeon_engine_worker.js docs/engine/yangmyeon_engine_worker.js
          cp variants.ini docs/engine/variants.ini
          cp Fairy-Stockfish-master-src/Fairy-Stockfish-master/tests/js/ffish.js docs/engine/ffish.js
          cp Fairy-Stockfish-master-src/Fairy-Stockfish-master/tests/js/ffish.wasm docs/engine/ffish.wasm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
